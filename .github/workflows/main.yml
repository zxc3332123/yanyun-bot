name: Yanyun News Monitor

on:
  schedule:
    - cron: '0 * * * *'  # 每個小時的 0 分自動執行一次
  workflow_dispatch:      # 讓你可以手動點擊測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 複製儲存庫內容
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行爬蟲
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      - name: 儲存記憶 (last_link.txt)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update last news link"
